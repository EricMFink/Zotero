- id: abelLawWarsFate2018
  abstract: >-
    The US 'war on terror', which Bush declared and Obama continued, repeatedly
    violated fundamental rule of law values. Law's Wars: The Fate of the Rule of
    Law in the US 'War on Terror' is the first comprehensive account of efforts
    to resist and correct those violations. It focuses on responses to abuses in
    Abu Ghraib, efforts by Guantánamo Bay detainees to improve conditions of
    confinement in and win release, exposés of and efforts to end torture and
    electronic surveillance, and civilian casualties on the battlefield,
    including targeted killings. Abel deploys a law and society perspective to
    construct and analyze detailed narratives of the roles of victims,
    whistle-blowers, the media, NGOs, lawyers, doctors, politicians, military
    personnel, foreign governments and international organizations in defending
    the rule of law. Only by understanding past errors can we hope to prevent
    their repetition in what promises to be an endless 'war on terror'.
  author:
