- id: yatesGreatInequality2016
  abstract: >-
    A growing inequality in income and wealth marks modern capitalism, and it
    negatively affects nearly every aspect of our lives, especially those of the
    working class. It is and will continue to be the central issue of politics
    in almost every nation on earth. In this book, the author explains
    inequality in clear, passionate, and intelligent prose: what it is, why it
    matters, how it affects us, what its underlying causes are, and what we
    might do about it. This book was written to encourage informed radical
