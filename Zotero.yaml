- id: figartDelvingFoodSupply2017
  abstract: >-
    This story opens in Immokalee, Florida, the fresh tomato capital of the USA.
    It is about one aspect of social practices in food production: the movement
    to increase the pay of farmworkers in the supply chain of the American
    tomato. In a new model of worker organizing, the Coalition of Immokalee
    Workers (CIW) realized growers were themselves squeezed by large fast food
    companies and supermarkets. So the Coalition went directly to food giants
    through their “penny a pound” movement, demanding that companies sign a Fair
    Food Agreement with a human rights code of conduct and independent
    monitoring. Today, coast to coast, at many fast food restaurants in the USA,
    you are eating a fair food tomato. And tomato pickers are earning more per
    week.
