    well as a new introduction by Harrington’s biographer, Maurice Isserman.
    This illuminating, profoundly moving classic is still all too relevant for
    today’s America.When Michael Harrington’s masterpiece, The Other America,
    was first published in 1962, it was hailed as an explosive work and became a
    galvanizing force for the war on poverty. Harrington shed light on the lives
    of the poor—from farm to city—and the social forces that relegated them to
