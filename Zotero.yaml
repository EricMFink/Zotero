- id: abelLawyersSocietyOverview1995
  abstract: >-
    Among all those who encounter the law in the conduct of their lives or who
    consider it as a career, few have a solid understanding of the legal
    profession in America, and fewer still know anything about systems in other
    parts of the world. Lawyers in Society offers a concise comparative
    introduction to the practice of law in a number of countries: England,
    Germany, Japan, Venezuela, and Belgium.  Extracted from the editors&#39;
    three highly successful volumes Lawyers in Society, these essays guide
    readers through the differing worlds of civil and common law, law in Europe
    and Asia, and first and third world legal systems. One contribution
