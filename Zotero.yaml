- id: stampferDidKhazarsConvert2013
  abstract: >-
    Abstract The view that some or all of the Khazars, a central Asian people,
    converted to Judaism at some point during the ninth or tenth century is
    widely accepted. A careful examination of the sources, however, shows that
    some of them are pseudepigraphic, and the rest are of questionable
    reliability. Many of the most reliable contemporary texts that mention
    Khazars say nothing about their conversion, nor is there any archaeological
    evidence for it. This leads to the conclusion that such a conversion never
    took place.
