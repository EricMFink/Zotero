- id: strikedebtDebtResistersOperations2014
  abstract: >-
    Strike Debt emerged out of thematic assemblies held in May 2012 in
    solidarity with the student strikes in Montreal. Occupy Theory, Occupy
    Student Debt Campaign, and Free University collaborated to hold an assembly
    on Education and Debt. Several weeks later, the group continued to meet
    under the name "Strike Debt." Strike Debt quickly realized that organizing
    around all forms of debt provided much-needed energy and systematic analysis
    to the movement. In addition to this manual, Strike Debt initiatives include
    launching the "Rolling Jubilee," a mutual-aid project that buys debt at
    steeply discounted prices and then abolishes it; hosting debtors'
    assemblies; and planning direct actions across the country, ranging from
    debt burnings to targeted shutdowns of predatory lenders. Each project is
    seen as a strike against the predatory debt system.
