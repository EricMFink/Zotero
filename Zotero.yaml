- id: SakeConsumerProtection2021
  abstract: >-
    The chapter focusses on discursive financialization of households performed
    by Czech public institutions (the Czech National Bank and the Ministry of
    Finance) and political actors. The chapter advances two arguments. The first
    concerns the ways in which the discourse of public institutions and
    politicians constructs households as financial subjects. Households are
    constructed as overlapping with the nuclear family and as a hybrid
    (unitary/compound) actor. This enables institutions to acknowledge the
    social dimensions of finance – specifically, consumer credit and the debt
    enforcement system. The second argument reveals the normative content of
    discursive financialization in the Czech Republic that blends paternalistic
    and neoliberal elements and combines a seemingly empowering accent on
    consumer rights with the central idea of (self-) protection. The public
    discourse on household finance constructs households as unreliable and
    irresponsible and calls for their responsible financial conduct through the
    means of financial (self-)education, which individualizes the issue and
    obscures its structural and legal conditions.
  citation-key: SakeConsumerProtection2021
  ISBN: 978-1-00-302885-7
