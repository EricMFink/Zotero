- id: wickensOrganizationalImpactUniversity2008
  abstract: >-
    The current review presents both postulated and empirically tested
    consequences of university unionization and labor strikes on the North
    American institution's administration, faculty, and students. The review
    explores the impact of collective bargining on employee working conditions
    including job security, academic freedom, university governance, and due
    process. More importantly, this review examines the much neglected issue of
    organizational work relationships in a unionized academic environment. The
    relationships discussed include those between faculty members, between the
    faculty and administration, betweenthe faculty and the university as an
    institution, and between the faculty and their union. The threat of
    unionization and labor strikes to the profess rstudent or mentor-mentee
    relationship has been a central concern of those opposed to graduate student
    unions, and this issue is also addressed here. The text concludes with he
    identification of potential areas for future research.
