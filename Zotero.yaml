- id: powellUsingBlogsNew2012
  abstract: >-
    Compiling a referenced article for publication in a peer-reviewed journal is
    traditionally the most respected means of contributing to a body of
    knowledge. However, we argue that publication of evidence-based information
    via new media – especially blogging – can also be a valid form of academic
    scholarship. Blogs allow for rapid sharing of research methods, results, and
    conclusions in an open, transparent manner. With proper references, blogs
    and other new media can position academic research in the public sphere and
    provide rapid, reliable information in response to emerging issues. They can
    also support other traditional goals of higher education institutions,
    serving as tools for teaching, learning and outreach.
