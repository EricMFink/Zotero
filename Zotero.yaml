- id: figartSwimmingDebtStudent2017
  abstract: >-
    In 2010, student loan debt surpassed credit card debt for the first time in
    US history. Default rates have increased following the Great Recession. Yet
    student debt, unlike most debt, is not dischargeable in bankruptcy, leaving
    those burdened by loans unable to move on with their lives. Hundreds of
    alumni from the private, for-profit Corinthian Colleges Inc. have proclaimed
    a debt strike, refusing to pay off their student loans. They assert they
    were defrauded by aggressive recruitment and specious promises about jobs,
    while Corinthian profited from federal loan funds. The seeds of this debt
    resistance movement, sown in the wake of Occupy Wall Street, are growing.
    The activism described in this chapter raises questions about the
    provisioning and financing of higher education in the neoliberal era.
