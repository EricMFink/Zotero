- id: klugerSimpleJusticeHistory2011
  abstract: >-
    Simple Justice is the definitive history of the landmark case Brown v. Board
    of Education and the epic struggle for racial equality in this country.
    Combining intensive research with original interviews with surviving
    participants, Richard Kluger provides the fullest possible view of the human
    and legal drama in the years before 1954, the cumulative assaults on the
    white power structure that defended segregation, and the step-by-step
