- id: eastmanItTimeStatute1995
  abstract: >-
    Numerous proposals to end employment at will and restrict wrongful dis­
    charge suits have been offered. Advocates contend that employers have an
    incentive to support such legislation, just as employers had an incentive to
    support workers' compensation laws. However, such legislation has made
    little headway. This article takes a close look at the analogy with workers'
    compensation and argues that legislation to end employ­ ment at will is
    unlikely to succeed unless it, like workers' compensation, involves a broad
    shift in employment law with principled appeal to employers as well as
    employees. It suggests that provisions affirming duties for employees as
    well as employers have the potential to break the current legislative
    impasse.
