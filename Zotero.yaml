- id: coleWobbliesWorldGlobal2017
  abstract: "Founded in 1905, Chicago’s Industrial Workers of the World (IWW) is a union unlike any other. With members affectionately called “Wobblies” and an evolutionary and internationalist philosophy and tactics, it rapidly grew across the world. Considering the history of the IWW from an international perspective for the first time, Wobblies of the World brings together a group of leading scholars to present a lively collection of accounts from thirteen diverse countries, revealing a fascinating story of anarchism, syndicalism, and socialism. \_ Drawing on many important figures of the movement—Har Dayal, James Larkin, William D. “Big Bill” Haywood, Enrique Flores Magón, and more—the contributors describe how the IWW and its ideals spread, exploring the crucial role the IWW played in industries such as shipping, mining, and agriculture. Ultimately, the book illuminates Wobblie methods of organizing, forms of expression, practices, and transnational issues, offering a fascinating alternative history of the group."
