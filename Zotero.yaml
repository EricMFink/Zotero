- id: fosterDoesMultistateBar2021
  abstract: >-
    2020 brought many challenges, which included administering the bar exam. 
    States jumped through numerous obstacles to continue administering the
    current form of the exam.  However, the current bar exam has never been
    proven to be a valid measure of attorney competence.  This article offers
    evidence the Multistate Bar Exam (MBE), is invalid. The exam, in other
    words, does not measure the knowledge and skills that lawyers use in
    practice. On the contrary, it is an artificial barrier to practice—one that
    harms the public by failing to screen for the knowledge and skills that
    clients need from their attorneys.
  author:
    - family: Foster
      given: Steven
  citation-key: fosterDoesMultistateBar2021
  container-title: Ohio State Law Journal Online
