- id: osborneLegalResearchPlan2016
  abstract: >-
    A new associate exits the office of Senior Partner with a research
    assignment. She returns to her office, sits down at the keyboard, pulls up
    her favorite search engine, and begins typing in keywords. This is the usual
    start to a research project by a novice researcher. This process may result
    in an answer; however, it is usually little more than an answer. The average
    attorney jumps into a research question without thinking.11 “The average
    attorney will dive into research without thinking. Don't yield to this
    temptation. Spend the time to just sit and think about your case, to know
    what question you should research.” Duane Ostler, The Strength Is in the
    Research, 20 Utah B.J. 42, 43 (2007). This article discusses the basic
    elements of a legal research plan, recommends designs of research plans, and
