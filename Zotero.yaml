- id: cherednychenkoIrresponsibleLendingPostCrisis2019
  abstract: >-
    More than a decade after the outbreak of the global financial crisis,
    consumers across the EU have been increasing their level of debt in terms of
    both volume and value of consumer credit products. Among the reasons for
    this trend are the low interest rate environment, the novel business
    practices of lenders aimed at finding new revenue sources, such as fees and
    charges on loans, and the innovative business models emerging in an
    increasingly digital marketplace, such as peer-to-peer lending. These
    developments present new risks to consumers and pose new challenges for
    regulators in terms of how to address them. This article aims to uncover the
    problematic aspects of consumer credit provision in the post-crisis lending
    environment across the EU and to assess to what extent the 2008 Consumer
    Credit Directive currently in force, which aims to ensure adequate consumer
    protection against irresponsible lending, is fit for its purpose today. In
    this context, the article explores the general meaning of “responsible
    lending” with emphasis on consumer credit, identifies the most imminent
    irresponsible lending practices in the consumer credit markets, and
    tentatively analyses their key drivers. It also reveals some important
    limitations of the Consumer Credit Directive in providing adequate consumer
    protection against irresponsible lending and offers tentative
    recommendations for improvement. In the authors’ view, the time now seems
    ripe for striking a different balance between access to credit and consumer
    protection in European consumer credit law.
