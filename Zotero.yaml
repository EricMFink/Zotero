- id: hudsonForgiveThemTheir2018
  abstract: "Selected \"Best Books of 2018: Economics\" by The Financial TimesIn ...and forgive them their debts, renowned economist Michael Hudson – one of the few who could see the 2008 financial crisis coming – takes us on an epic journey through the economies of ancient civilizations and reveals their relevance for us today. For the past 40 years, in conjunction with Harvard’s Peabody Museum, he and his colleagues have documented how interest-bearing debt was invented in Bronze Age Mesopotamia, and then disseminated to the ancient world. What the Bronze Age rulers understood was that avoiding economic instability required regular royal debt cancellations. Professor Hudson documents dozens of these these royal edicts and traces the archeological record and history of debt, and how societies have dealt with (or failed to deal with) the proliferation of debts that cannot be paid – and their consequences. In the pages of ...and forgive them their debts, readers will discover how debt played a central role in shaping ancient societies, and how it continues to shape our world – often destructively.The Big Question: What happens when debts cannot be paid? Will there be a writedown in favor of debtors (as is routinely done for large corporations), or will creditors be allowed to foreclose (as is done to personal debtors and mortgagees), leading to the creditors' political takeover of the economy’s assets – and ultimately the government itself? Historically, the remedy of record was the royal Clean Slate proclamation, or biblical Jubilee Year of debt forgiveness.The Real Message of Jesus: Jesus’s first sermon announced that he had come to proclaim a Clean Slate debt cancellation (the Jubilee Year), as was first described in the Bible (Leviticus 25), and had been used in Babylonia since Hammurabi’s dynasty. This message – more than any other religious claim – is what threatened his enemies, and is why he was put to death. This interpretation has been all but expunged from our contemporary understanding of the phrase, “…and forgive them their debts,” in The Lord’s Prayer. It has been changed to “…and forgive them their trespasses (or sins),” depending on the particular Christian tradition that influenced the translation from the Greek opheilēma/opheiletēs (debts/debtors).Contrary to the message of Jesus, also found in the Old Testament of\_the Bible and in other ancient texts, debt repayment has become sanctified and mystified as a way of moralizing claims on borrowers, allowing creditor elites and oligarchs the leverage to take over societies and privatize personal and public assets – especially in hard times. Historically, no monarchy or government has survived takeover by creditor elites and oligarchs (viz: Rome). Perhaps most striking is that – according to a nearly complete consensus of Assyriologists and biblical scholars – the Bible is preoccupied with debt forgiveness more than with sin.In a time of increasing economic and political polarization, and a global economy deeper in debt than at the height of the 2008 financial crisis, ...and forgive them their debts documents what individuals, governments and societies can learn from the ancient past for restoring economic and social stability today."
  author:
    - family: Hudson
      given: Michael
  citation-key: hudsonForgiveThemTheir2018
  ISBN: 978-3-9818260-2-9
  issued:
    - literal: 2018-10-0030
  language: English
  number-of-pages: '340'
  publisher: ISLET
  source: Amazon
  title: >-
    ...and forgive them their debts: Lending, Foreclosure and Redemption From
