- id: figartContestingGigEconomy2017
  abstract: >-
    The old norms of the 9-to-5, 40-h workweek developed in the twentieth
    century have eroded. They have been replaced with unpredictable schedules
    where the number and timing of work hours can vary day-to-day.
    #SchedulesThatWork is a rallying cry for workers responding to this new
    flexibility. The chapter considers a new crusade for the nation’s retail
    labor force, fueled by labor-worker–community coalitions such as the Retail
    Action Project. Led by New York State, several state attorneys general have
    sought to apply labor laws to curtail these employment practices. In a
    victory for their largely part-time workforce, some major retailers such as
    Starbucks, The Gap, Macys, and Zara have ended their “on-call” shifts and
    are posting schedules with more advance notice.
