- id: domhoffPowerEliteState2017
  abstract: >-
    This volume presents a network of social power, indicating that theories
    inspired by C.Wright Mills are far more accurate views about power in
    America than those of Mills's opponents.Dr. Domhoff shows how and why
    coalitions within the power elite have involved themselves in such policy
    issues as the Social Security Act (1935) and the Employment Act (1946), and
    how the National Labor Relations Act (1935) could pass against the
    opposition of every major corporation. The book descri bes how experts
    worked closely with the power elite in shaping the plansfor a post-World War
    II world economic order, in good part realized during the past 30 years.
    Arguments are advanced that the fat cats who support the Democrats cannot be
    understood in terms of narrow self-interest, and that moderate conservatives
    dominated policy-making under Reagan.
