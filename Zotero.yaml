- id: andrewsLocalProtestFederal2015
  abstract: >-
    When and how do movements influence policy change? We examine the dynamics
    leading up to Kennedy's decision to pursue major civil rights legislation in
    1963. This marked a key turning point in shifting the executive branch from
    a timid and gradualist approach. Although it is widely taken for granted
    that the civil rights movement propelled this shift, how the movement
    mattered is less clear. While most protest targeted local economic actors,
    movement influence was exerted at the national level on political actors.
    Thus, movement influence was indirect. We focus on the relationship between
    local movement efforts to desegregate public accommodations (restaurants,
    movie theaters, hotels, etc.) and federal responses to movement demands.
    Although exchanges between movement actors and the federal government took
    place throughout the period, the logic of federal response evolved as
    political actors sought strategies to minimize racial conflict.
    Specifically, the Kennedy administration shifted to a dual strategy. First,
    the Department of Justice attempted to promote "voluntary" desegregation by
    working with executives of national companies and civic groups. Second,
    administration officials worked with these same groups to build support for
    major legislation among key interest groups. This shift toward a more
    assertive and proactive intervention in civil rights stands in contrast to
    the pessimism regarding the prospects for federal policy only a few months
    earlier. We examine the logic of this response including the impact of civil
    rights protest on the administration's policy proposals.
  author:
