- id: fones-wolfSellingFreeEnterprise1995
  abstract: >-
    The post-World War II years in the United States were marked by the business
    community's efforts to discredit New Deal liberalism and undermine the power
    and legitimacy of organized labor. In Selling Free Enterprise, Elizabeth
    Fones-Wolf describes how conservative business leaders strove to reorient
    workers away from their loyalties to organized labor and government,
    teaching that prosperity could be achieved through reliance on individual
    initiative, increased productivity, and the protection of personal liberty.
    Based on research in a wide variety of business and labor sources, this
    detailed account shows how business permeated every aspect of American life,
    including factories, schools, churches, and community institutions.
