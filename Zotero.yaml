- id: devilleDebtorPublicsTracking2016
  abstract: >-
    In the context of apparently ubiquitous relations of debt, it has been
    argued that the debtor possesses a unique, revolutionary potential. Why is
    this potential seemingly as yet unrealised? Where might nascent debtor
    publics be found? And what conditions, what infrastructures, might
    facilitate their emergence? In answering these questions, this paper argues
    that there are spaces where emergent “counter-agencing” debtor publics can
    be detected – however, these are organising less around the issue of
    (consumer credit) borrowing than default. By analysing a prominent online
    debtor's forum in the UK – the Consumer Action Group debt collection
    industry sub-forum – the paper argues that such spaces contain important
    insights into the politics of credit markets and debt default, collective
    practices of calculation, and the formation of publics.
