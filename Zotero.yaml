- id: fieldsWhitenessRacismIdentity2001
  abstract: >-
    As an organizing concept, whiteness rests on insecure theoretical
    ground—specifically, the notions of identity and agency. It replaces racism
    with race and equates race with racial identity, which it accepts
    uncritically both as an empirical datum and as a tool of analysis. It
    thereby establishes a false parallel between the objects and the authors of
    racism and between Afro-Americans and other Americans of non-European
    ancestry. Whiteness is the ideological counterpart of race relations, both
    of them ways of skirting around the relations of political, social, and
    economic power that have determined the place of Afro-Americans in American
    society.
