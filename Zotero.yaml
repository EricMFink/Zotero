- id: murphySociologyDebt2019
  abstract: >-
    This chapter examines how religious authorities conceptualized debt as
    sinful because they considered it as unproductive, demonizing moneylenders
    or creditors who profited from usury. Understanding debt as sin has not
    vanished, though who is considered the sinner has shifted primarily from the
    creditor to the debtor. The chapter discusses how this shift originated
    during the Protestant Reformation in the work of Martin Luther and John
    Calvin. Now, a credit score signifies a debtor's character and shapes her
    life chances, including how high her interest rate will be. These scores
    have become critical techniques of power that control debtors. Debt produces
    new techniques of power not just for creditors, but also for debtors. While
    it is quite straightforward to witness how debtors are disciplined and
    controlled by creditors, the power of debtors is important to recognize as a
    possible form of resistance and force of social change.
