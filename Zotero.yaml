- id: aronowitzParadigmLostState2006
  abstract: >-
    With increasing globalization, the meaning and role of the nation-state are
    in flux. At the same time, state theory, which might help to explain such a
    trend, has fallen victim to the general decline of radical movements,
    particularly the crisis in Marxism. This volume seeks to enrich and
    complicate current political debates by bringing state theory back to the
    fore and assessing its relevance to the social phenomena and thought of our
    day. Throughout, it becomes clear that, whether confronting the challenges
    of postmodern and neo-institutionalist theory or the crisis of the welfare
    state and globalization, state theory still has great analytical and
    strategic value.
