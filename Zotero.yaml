- id: toussaintDebtSystemHistory2019
  abstract: >-
    For as long as there have been rich nations and poor nations, debt has been
    a powerful force for maintaining the unequal relations between them. Treated
    as sacrosanct, immutable, and eternally binding, it has become the yoke of
    choice for imperial powers in the post-colonial world to enforce their
