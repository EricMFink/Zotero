- id: meyerSignalsSpilloverBrown2007
  abstract: >-
    The watershed Supreme Court decision in "Brown v. Board of Education"
    affected activist politics on issues that extend well beyond
    African-American civil rights or education. The apparent success of the
    Court decision in spurring social change encouraged activists in other
    social movements to emulate the NAACP Legal Defense Fund's litigation
    strategy, and to adapt organizational structures, political strategies, and
    rhetoric borrowed from the civil rights movement. We examine how a Supreme
    Court decision and its subsequent interpretation influenced the development
    of other social movements. Borrowing from work on social movements, we
    contend that the Court decision signaled judicial openness to stand up for
    minority points of view on questions of fundamental rights, and that the
    civil rights movement spilled over to affect other movements. Activists
    continued to respond to that signal decades after Brown, even when that
    signal of judicial responsiveness and openness did not reflect the real
    prospects for achieving influence through a litigation-based strategy.
