- id: vecernikHouseholdConsumptionCzech2008
  abstract: >-
    This article gathers a variety of evidence demonstrating the rapid
    development of household consumption in the Czech Republic during the
    post-1989 period. In the first section, the basic features of household
    consumption under the communist regime are described. In the second section,
    the transition to a market economy and its likely positive impact on the
    economic conditions and behaviour of households is discussed. In the third
