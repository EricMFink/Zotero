- id: brauneWhoAfraidFrankfurt2019
  abstract: >-
    This article argues that "Cultural Marxism" is an antisemitic conspiracy
    theory, by drawing from three of the main proponents of the theory in the
    United States today. According to the conspiracy theory, the Jewish Marxists
    of the Frankfurt School implemented a slow takeover of "culture," seeking to
    undermine Christianity, family, and nation in favor of a new worldview and
    system of control, involving mass immigration, sexual liberation, and moral
    and aesthetic decline. Cultural Marxists, the conspiracy theorists believe,
    now control all areas of public life, including the media, schools,
    entertainment, the economy, and national and global systems of governance.
    Not only does this theory vastly overestimate the influence of a small group
    of intellectuals, the conspiracy theory trades on the Frankfurt School's
    perceived Jewishness and amplifies antisemitic tropes. This article focuses
    on three of the main proponents of the Cultural Marxism conspiracy
    theory--white nationalist Kevin MacDonald and self-titled
    paleo-conservatives William S. Lind and Paul Gottfried--showing how the work
    of each on the Frankfurt School amplifies antisemitic tropes and engages in
    conspiracy thinking that misrepresents the Frankfurt School's ideas and
    influence.
  author:
