- id: barrettYourDebtsAre2020
  abstract: >-
    Abstract Unlike in other countries with debt-saddled populations, the issue
    of consumer debt has been weakly politicized in Azerbaijan. There have been
    no social movements of the kind that occurred around the financial crises in
    the United States, the European periphery, or even in Ukraine's
    post-revolution attempt at a “financial Maidan.” The lack of a public
    politics of debt left banks to act as predators, using a weak court system
    to intimidate people and obtain repayment of debts. Yet the constraints to
    the public sphere within which a contentious politics might unfold does not
    mean no such politicization exists. Using the example of Antikollektor, a
    successful anti-debt-collection agency in Baku, this article demonstrates
    the usefulness of building an understanding of civil society outside of the
    reductivist frames that shape recent debates over the authoritarian backlash
    against foreign-funded organized civil society in the former Eastern Bloc.
