- id: shapiroProtectingCompetitionAmerican2019
  abstract: >-
    Accumulating evidence points to the need for more vigorous antitrust
    enforcement in the United States in three areas. First, stricter merger
    control is warranted in an economy where large, highly efficient and
    profitable "superstar" firms account for an increasing share of economic
    activity. Evidence from merger retrospectives further supports the
    conclusion that stricter merger control is needed. Second, greater vigilance
    is needed to prevent dominant firms, including the tech titans, from
    engaging in exclusionary conduct. The systematic shrinking of the scope of
    the Sherman Act by the Supreme Court over the past 40 years may make this
    difficult. Third, greater antitrust scrutiny should be given to the
    monopsony power of employers in labor markets.
