- id: blochGlobalClinicalMovement2010
  abstract: >-
    Clinical legal education is playing an increasingly important role in
    educating lawyers worldwide. In The Global Clinical Movement: Educating
    Lawyers for Social Justice, editor Frank S. Bloch and contributors describe
    the central concepts, goals, and methods of clinical legal education from a
    global perspective, with a particular emphasis on its social justice
    mission. With chapters written by leading clinical legal educators from
    every region of the world, The Global Clinical Movement demonstrates how the
    emerging global clinical movement can advance social justice through legal
    education. Professor Bloch and the contributors also examine the influence
    of clinical legal education on the legal academy and the legal profession
    and chart the global clinical movement's future role in educating lawyers
    for social justice. The Global Clinical Movement consists of three parts.
    Part I describes clinical legal education programs from every region of the
    world and discusses those qualities that are unique to a particular country
    or region. Part II discusses the various ways that clinical programs and the
    clinical methodology advance the cause of social justice around the world.
    Part III analyzes the current state of the global clinical movement and sets
    out an agenda for the movement to advance social justice through socially
    relevant legal education.
