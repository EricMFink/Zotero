- id: fassbenderWorkflowManagingInformation2013
  abstract: >-
    This article describes how contemporary referencing software, a tablet
    device and speech-recognition software were used to improve the traditional
    research workflow, referring primarily to the process of finding journal
    articles, downloading the bibliographical details with full text, then
    reading and annotating them in an as efficient way as possible. This was
    done using Third Street's Sente referencing software on an Apple Mac to
    manage the bibliographical database and to automatically synchronise with
    its companion application on the iPad, then using the built-in tools of the
    Sente application on the iPad to highlight any text in the article that is
    of particular interest. The highlighted passages were automatically synced
    back to the Apple Mac application, and the researcher then used Nuance's
    Dragon Dictate on the Apple Mac to dictate a summary of the article directly
    into the notes field in Sente or into the notepad of Dragon Dictate.
