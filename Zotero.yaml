- id: stoetzlerCapitalismNationSocietal2019
  abstract: >-
    This essay aims to contribute to a better understanding of the concept of
    'left-wing antisemitism'. It points to 'anti-imperialism', i.e. the
    nationalist, often culturalist, resistance to the global spread of the
    capitalist mode of production, as a crucial context of contemporary
    antisemitism in which the boundaries between 'right-wing' and 'leftwing' are
    often blurred. The main contention is that the dialectic of capitalism and
    emancipation is central to understanding antisemitism: the fact that
    capitalism itself creates the conditions of, and the means for, overcoming
    capitalism produces the space of confusion in which the concept of
    'left-wing antisemitism' emerges.
