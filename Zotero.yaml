- id: mcmullanLobsterPoachingIronies2002
  abstract: >-
    This article studies law in action as it relates to organized lobster
    poaching in Canada. It examines the distinct pattern of relationships that
    constitutes poaching as a business enterprise and analyzes how "living law"
    operates as an ironic facilitative form for that which it tries to control.
    We argue that business poachers evade, avoid, and neutralize fishery laws
    and regulations by creatively using and manipulating the legal boundaries
    and organizational resources at their disposal. In effect, the law is an
    enabling structure for blue water illegality. We analyze business poaching
    activities as a type of workplace crime, and we account for regulatory
    failure in the lobster fishery.
