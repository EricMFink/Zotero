- id: newmanInformationWorkflowAcademic2013
  abstract: >-
    Digital journals have been widely adopted by academic researchers and have
    nearly replaced printed journals in many contexts. The adoption of digital
    books is accelerating. The transition to digital information has changed
    information workflows of researchers by transforming the methods they use to
    find, store, retrieve, and use information from monographs, journals, and
    other sources. It has also changed the needs and expectations of scholars in
    relation to research information. To investigate these changes, 45
    researchers in science, medicine, engineering, social sciences, and
    humanities at Stanford University were interviewed regarding information
    workflow and preferences. Results are compared with the findings of the
