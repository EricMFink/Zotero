  abstract: >-
    This brief presentation addressed free access to primary legal materials,
    discussing the scope and nature of open access, and referring to the Free
    Access to Law Movement. The social imperatives for free access were
    outlined. Various sectors providing free access and their funding models
    were discussed. Requirements for freely accessible legal information were
    enumerated including existing standards. The definition of added value and
