- id: burleyIntroductionSocialismFools2019
  abstract: >-
    As an introduction to the topic of anti-Semitism, this article brings
    together the common issues that lead to the conceptual complexity of
    anti-Semitism. The breach of anti-Semitism into public politics and the
    organized left through the two-axis points of Israel and conspiracy theories
    are discussed, in particular recent controversies in the Labour Party,
    attacks on religious centers, and discordant views on what qualifies as
    anti-Semitism. Weaving together personal narratives, the essay unpacks the
    difficulty of considering anti-Semitism in the contemporary understanding of
    oppression, colonialism, and white supremacy.
