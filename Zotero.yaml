    It appears to be taken for granted today that there is no future for U.S.
    labor law and that the only legitimate discussion is about what will replace
    the National Labor Relations Act (NLRA 1;29 U.S.C. 151). However, what if
    these conclusions misread the complex forces that have affected union
    membership and power? Some contend that unions and collective bargaining are
    dinosaurs that have no relevance to our times. However, consider the role of
    unionization and collective bargaining as necessary counterweights to the
