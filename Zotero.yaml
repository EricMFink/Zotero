- id: sohoniUnsuitableSuitorsAntiMiscegenation2014
  abstract: >-
    In 1861, Nevada became the first state to pass a law specifically barring
    marriages between whites and Asians. Over the course of the next century,
    until the 1967 Supreme Court decision *Loving v. Virginia* declared
    anti-miscegenation laws unconstitutional, an additional 14 states came to
    ban marriages between whites and Asians. While social scientists have
    detailed extensively how whites created laws to limit the rights and
    privileges of minority groups within the United States, less frequently
    examined are the manner by which these laws helped shape and determine the
    meaning of racial groups and the features selected to demarcate group
    boundaries.
