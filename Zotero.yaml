    Politics" is something of a departure from all recent literature on the
    Supreme Court. The book attempts to state and substantiate a conception of
    the Supreme Court of the United States that is consistent with the theory
    and practice of political democracy. The author focuses on the Court's
    complex relationship with the nation's political institutions, in the
