- id: mikusMakingDebtWork2020
  abstract: >-
    Debt collection is a crucial stage in the life-cycle of debt, but so far it
    has been largely neglected in the anthropology of credit/debt. Based on
    publicly available data and interactions with debtors, professionals and
    activists, the chapter explores Croatia’s unique system of debt collection.
    Facing demands of European integration and a surge of bad loans after a
    financialized debt boom, the government authorized a state-owned agency,
    public notaries and lawyers to collect debts in highly coercive and
    profitable ways. Foreign-owned debt collection agencies also rapidly
    expanded their presence. This resulted in public debates and political
    struggles over debt collection.
