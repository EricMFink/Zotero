  abstract: >-
    The United States is distinctive among advanced economies in that its
    employment laws and practices are governed by Employment at Will (EAW). Most
    other nations have variations on Just Cause dismissal rules. I argue that
    the U.S. preference for EAW is unsupported by concerns about net social or
    economic consequences. More centrally, I argue that the basic moral
