- id: kawarLegalMobilizationTerrain2011
  abstract: >-
    Scholarship on law and social movements has focused attention primarily on
    the United States, and secondarily on countries that share the
    Anglo-American legal tradition. The politics of law and social movements in
    other national legal contexts remains underexamined. The analysis in this
    article contrasts legal mobilizations for immigrant rights in France and the
    United States, and explores the relations between national fields of power
    and legal practices. I trace the institutionalization of immigrant rights
    legal organizations in each country and argue that the divergent
    organizational forms and litigation strategies adopted by professionalized
    movement organizations reflect the dynamics of the nationally distinct
    fields of power relations within which law reform has been conducted. My
    analysis links the material and symbolic resources available to law
    reformers to the relative authority of private and public juridical actors
    in each state.
