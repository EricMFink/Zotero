- id: pollettaStructuralContextNovel2000
  abstract: >-
    Theorists of Critical Legal Studies (CLS) have argued that the abstract,
    individualistic, and state-dependent character of rights makes them of
    dubious value for groups fighting for social change. Southern civil rights
    organizers in the early 1960s engaged in the kind of power-oriented strategy
    that CLS writers advocate in lieu of a rights-oriented one. However, the
    rights claims they made inside and outside courtrooms were essential to
    their political organizing efforts. Far from narrowing collective
    aspirations to the limits of the law, activists' extension of rights claims
    to the "unqualified" legitimated assaults on economic inequality,
    governmental decisionmaking in poverty programs, and the Vietnam War. What
    made possible this novel formulation was not only the multivalent character
    of rights but also key features of the social, political, and organizational
    contexts within which rights were advanced.
