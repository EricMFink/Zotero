- id: freemanWhatWorkersWant2006
  abstract: >-
    Praise for the first edition:"This very valuable book reports the results of
    a large-scale and complex survey aimed at understanding the preferences of
    employees regarding workplace governance and their attitudes toward the
    three key institutions in the labor market: unions, government, and
    firms.... The findings are... sophisticated and convincing.... This is a
    terrifically useful book that contains a wealth of information."―Labor
    History "What Workers Want is one of the most ambitious efforts ever
    undertaken to determine the attitudes of employees about the American
    workplace.... An extremely important contribution to the long and often
    heated debates that swirl around these issues."―Ralph Nader, Public Citizen
    News"What Workers Want is a sharply focused study of how American workers
    think about workplace participation. This book is a message about workplace
    democracy that union leaders would do well to build into their organizing
    strategies."―Dissent "This is easily one of the most readable books on
    industrial relations matters written by academics in recent times. The
    authors are able simultaneously to engage the reader in an almost folksy
    manner, while also being quite rigorous in their presentation of data. There
    should be more such books."―The Journal of Industrial Relations How would a
    typical American workplace be structured if the employees could design it?
    According to Richard B. Freeman and Joel Rogers, it would be an organization
    run jointly by employees and their supervisors, one where disputes between
    labor and management would be resolved through independent arbitration.
    Their groundbreaking book provides a comprehensive account of employees'
    attitudes about participation, representation, and regulation on the job.
    For this edition, the authors have added an introduction showing how recent
    data have confirmed and strengthened their basic argument. A new concluding
    chapter lays out the model of "open source unionism" that they propose for
    rebuilding unionism in the United States, making this updated edition
    essential for anyone thinking about what labor should be doing to move
    forward.
