  type: book

- id: klarmanJimCrowCivil2006
  abstract: >-
    A monumental investigation of the Supreme Court's rulings on race, From Jim
    Crow To Civil Rights spells out in compelling detail the political and
    social context within which the Supreme Court Justices operate and the
    consequences of their decisions for American race relations. In a highly
    provocative interpretation of the decision's connection to the civil rights
    movement, Klarman argues that Brown was more important for mobilizing
    southern white opposition to racial change than for encouraging
    direct-action protest. Brown unquestioningly had a significant impact—it
    brought race issues to public attention and it mobilized supporters of the
    ruling. It also, however, energized the opposition. In this authoritative
    account of constitutional law concerning race, Michael Klarman details, in
    the richest and most thorough discussion to date, how and whether Supreme
    Court decisions do, in fact, matter.
