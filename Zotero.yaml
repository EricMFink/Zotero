- id: meyerMovementsCountermovementsStructure1996
  abstract: >-
    Movement-countermovement interaction is an ongoing feature of contemporary
    social movements and, indeed, of contemporary politics. Yet the interplay of
    contending movements is understudied and undertheorized. This article begins
    to remedy this deficit by arguing that new work on political opportunity
    structure provides important insights and significant theoretical leverage
    for this study. Through a review of the literatures on countermovements and
    political opportunity, this article argues that this interaction increases
    when states enable but do not satisfy challengers. This article presents a
    general framework of theoretical propositions for understanding the
    interplay of movements and their opponents to animate and guide subsequent
    research.
