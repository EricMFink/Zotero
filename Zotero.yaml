- id: francisPriceCivilRights2019
  abstract: >-
    What influence do funders have on the development of civil rights legal
    mobilization? Fundraising is critical to the creation, operation, and
    survival of rights organizations. Yet, despite the importance of funding,
    there is little systematic attention in the law and social movements and
    cause lawyering literatures on the relationship between funders and
    grantees. This article recovers a forgotten history of the National
    Association for the Advancement of Colored People's (NAACP) campaign to
    protect black lives from lynchings and mob violence in the early twentieth
    century. I argue that funders engaged in a process of movement capture
    whereby they used their financial leverage to redirect the NAACP's agenda
    away from the issue of racial violence to a focus on education at a critical
    juncture in the civil rights movement. The findings in this article suggest
    that activists tread carefully as the interaction between funders and social
    movement organizations often creates gaps between what activists want and
    what funders think movements should do.
