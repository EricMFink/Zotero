    is it simply an extension of age-old practices of trade and commerce.In this
    original and provocative book Ellen Meiksins Wood reminds us that capitalism
    is not a natural and inevitable consequence of human nature, nor is it
    simply an extension of age-old practices of trade and commerce. Rather, it
    is a late and localized product of very specific historical conditions,
